<!DOCTYPE html>
<html>
  <head>
    <title>Ticket Booking</title>
  </head>

  <body>
    <h2>Book Ticket</h2>

    <form action="book" method="post">
      Name:
      <input type="text" name="name" /><br /><br />

      Movie:
      <input type="text" name="movie" /><br /><br />

      Seats:
      <input type="number" name="seats" /><br /><br />

      <button type="submit">Book Ticket</button>
    </form>
  </body>
</html>
